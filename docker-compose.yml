services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c max_connections=50
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d hn_signal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Collector (every 15 min) ─────────────────────────────────────────────────
  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  # ── Snapshotter (every 15 min) ───────────────────────────────────────────────
  snapshotter:
    build:
      context: .
      dockerfile: snapshotter/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  # ── Predictor (every 15 min, offset +5 min) ──────────────────────────────────
  predictor:
    build:
      context: .
      dockerfile: predictor/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MODEL_DIR: /models
    volumes:
      - models:/models

  # ── Telegram Bot (always on) ─────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}

  # ── Trainer (daily at 03:00 UTC) ─────────────────────────────────────────────
  trainer:
    build:
      context: .
      dockerfile: trainer/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      BLOWUP_SCORE_THRESHOLD: ${BLOWUP_SCORE_THRESHOLD:-200}
    volumes:
      - models:/models
      - .:/app

  # ── Monitor (daily at 09:00 UTC) ─────────────────────────────────────────────
  monitor:
    build:
      context: .
      dockerfile: monitor/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hn_signal
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      MIN_PRECISION: ${MIN_PRECISION:-0.30}
      MIN_RECALL: ${MIN_RECALL:-0.30}
      BLOWUP_SCORE_THRESHOLD: ${BLOWUP_SCORE_THRESHOLD:-200}

volumes:
  postgres_data:
  models:
